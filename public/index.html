<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>医学科普文章工作台</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div>
      <p class="eyebrow">Medical Content Studio</p>
      <h1>医学科普文章工作台</h1>
      <p>面向医院公众号 / 小红书：结构化编写、保存草稿、生成提示词。</p>
    </div>
    <div id="userBox"></div>
  </header>

  <main>
    <section id="auth" class="card auth-card">
      <h2>登录 / 注册</h2>
      <div class="grid two">
        <label>用户名<input id="username" placeholder="例如 yuqian" /></label>
        <label>密码<input id="password" type="password" placeholder="至少 6 位" /></label>
      </div>
      <div class="actions">
        <button onclick="login()">登录</button>
        <button class="secondary" onclick="register()">注册</button>
      </div>
      <p class="hint">本地使用，账号数据保存在 SQLite 数据库中。</p>
    </section>

    <section id="app" class="hidden">
      <div class="layout">
        <aside class="card">
          <div class="side-title">
            <h2>文章列表</h2>
            <button onclick="newArticle()">新建</button>
          </div>
          <div id="articleList" class="list"></div>
        </aside>

        <section class="card editor">
          <h2>文章信息</h2>
          <input type="hidden" id="articleId" />
          <div class="grid two">
            <label>内部标题<input id="title" placeholder="例如：地中海贫血科普稿" /></label>
            <label>疾病/主题<input id="disease" placeholder="例如：地中海贫血" /></label>
            <label>发布平台<input id="platform" value="医院公众号 / 小红书" /></label>
            <label>目标字数<input id="word_count" type="number" value="500" /></label>
          </div>
          <label>受众<textarea id="audience">关注自身健康、无医学知识的普通群众</textarea></label>

          <div class="template-note">
            <strong>默认结构：</strong>是什么 → 临床表现 → 诊断依据 → 治疗原则与转归 → 就医提醒。保持科学严谨，不夸大，不替代诊疗。
          </div>

          <div class="grid two">
            <label>2.1 什么是该疾病<textarea id="section1" placeholder="可先写要点，也可留空"></textarea></label>
            <label>2.2 临床表现<textarea id="section2" placeholder="症状、入院/发现情境"></textarea></label>
            <label>2.3 诊断依据<textarea id="section3" placeholder="实验室检查、诊断标准"></textarea></label>
            <label>2.4 治疗原则与转归<textarea id="section4" placeholder="治疗原则、预后、随访"></textarea></label>
          </div>
          <label>结尾提醒<textarea id="summary" placeholder="出现哪些身体信号要及时就医"></textarea></label>
          <label>配图建议<textarea id="image_notes" placeholder="例如：红细胞示意图、症状提示卡片、就医提醒图"></textarea></label>

          <div class="actions sticky-actions">
            <button onclick="saveArticle()">保存</button>
            <button class="secondary" onclick="copyPrompt()">生成并复制 AI 提示词</button>
            <button class="danger" onclick="deleteArticle()">删除</button>
          </div>
          <pre id="promptBox" class="prompt hidden"></pre>
        </section>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
